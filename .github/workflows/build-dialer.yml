name: Build Dialer (Windows)

on:
  push:
    branches: [main]
    paths:
      - 'dialer/**'
      - '.github/workflows/build-dialer.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dialer
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: call-maker-dialer-windows
          path: |
            dialer/src-tauri/target/release/bundle/msi/*.msi
            dialer/src-tauri/target/release/bundle/nsis/*.exe
